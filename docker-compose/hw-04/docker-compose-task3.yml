name: Rabbitmq

services:
  rabbitmq1:
    image: rabbitmq:4.2.4-management
    container_name: rabbitmq1
    hostname: rabbitmq1
    mem_limit: 2g
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_DEFAULT_USER}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_DEFAULT_PASS}
      - RABBITMQ_ERLANG_COOKIE=${RABBITMQ_ERLANG_COOKIE}
    ports:
      - 15672:15672
      - 5672:5672
    volumes:
      - ./config:/etc/rabbitmq/conf.d
      - ./policies:/etc/rabbitmq/definitions.d
      - ./code/pass_hash.sh:/usr/local/bin/pass_hash.sh
    entrypoint: /usr/local/bin/pass_hash.sh

  rabbitmq2:
    image: rabbitmq:4.2.4-management
    container_name: rabbitmq2
    hostname: rabbitmq2
    mem_limit: 2g
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_DEFAULT_USER}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_DEFAULT_PASS}
      - RABBITMQ_ERLANG_COOKIE=${RABBITMQ_ERLANG_COOKIE}
    ports:
      -  5673:5672
    volumes:
      - ./config:/etc/rabbitmq/conf.d
      - ./policies:/etc/rabbitmq/definitions.d
      - ./code/pass_hash.sh:/usr/local/bin/pass_hash.sh
    entrypoint: /usr/local/bin/pass_hash.sh
    depends_on:
      - rabbitmq1

  rabbitmq3:
    image: rabbitmq:4.2.4-management
    container_name: rabbitmq3
    hostname: rabbitmq3
    mem_limit: 2g
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_DEFAULT_USER}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_DEFAULT_PASS}
      - RABBITMQ_ERLANG_COOKIE=${RABBITMQ_ERLANG_COOKIE}
    ports:
      -  5674:5672        
    volumes:
      - ./config:/etc/rabbitmq/conf.d
      - ./policies:/etc/rabbitmq/definitions.d
      - ./code/pass_hash.sh:/usr/local/bin/pass_hash.sh
    entrypoint: /usr/local/bin/pass_hash.sh
    depends_on:
      - rabbitmq1