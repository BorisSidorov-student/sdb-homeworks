# Отключаем демон-режим (ОБЯЗАТЕЛЬНО для Docker)
daemonize no

# Указываем путь к файлу лога внутри контейнера
logfile /var/log/redis/redis.log

# Рекомендуемый уровень лога для продакшена
loglevel notice

# Разрешаем подключения со всех интерфейсов (если нужно)
# bind 0.0.0.0

# Отключаем защищенный режим для внешних подключений (если нужно)
# protected-mode no

# Настройки персистентности (чтобы данные не терялись)
save 900 1
save 300 10
save 60 10000
appendonly yes
appendfilename "appendonly.aof"
dir /data